<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zen Tile Match</title>
  <link rel="icon" type="image/png" href="icon.png">
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F9F7F2;
      --sage:      #B2AC88;
      --sage-dark: #8f8a68;
      --charcoal:  #333333;
      --tile-bg:   #EDEADE;
      --tile-done: #d6d2b5;
      --shadow:    rgba(51,51,51,0.10);
      --radius:    14px;
      --transition: 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Georgia', 'Times New Roman', serif;
      color: var(--charcoal);
      overflow-x: hidden;
    }

    /* ─── Background texture ────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(178,172,136,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(178,172,136,0.10) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Layout ────────────────────────────────────────────────── */
    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 32px;
      gap: 28px;
    }

    /* ─── Header ────────────────────────────────────────────────── */
    header {
      text-align: center;
      user-select: none;
    }
    header .logo-mark {
      font-size: 2rem;
      letter-spacing: 0.18em;
      color: var(--sage);
      display: block;
      line-height: 1;
      margin-bottom: 4px;
    }
    header h1 {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: normal;
      letter-spacing: 0.12em;
      color: var(--charcoal);
    }
    header p.subtitle {
      margin-top: 6px;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--sage);
    }

    /* ─── Stat Bar ──────────────────────────────────────────────── */
    .stat-bar {
      display: flex;
      gap: 24px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .stat-value {
      font-size: 1.6rem;
      font-weight: normal;
      letter-spacing: 0.06em;
      color: var(--charcoal);
      line-height: 1;
      min-width: 48px;
      text-align: center;
    }
    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--sage);
    }
    .stat-divider {
      width: 1px;
      height: 32px;
      background: var(--sage);
      opacity: 0.4;
    }

    /* ─── Progress Bar ──────────────────────────────────────────── */
    .progress-wrap {
      width: min(360px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sage);
    }
    .progress-track {
      height: 4px;
      background: rgba(178,172,136,0.25);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--sage), var(--sage-dark));
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    /* ─── Grid ──────────────────────────────────────────────────── */
    .grid-wrapper {
      position: relative;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(8px, 2.5vw, 14px);
      width: min(380px, 92vw);
      background: rgba(178,172,136,0.12);
      border: 1px solid rgba(178,172,136,0.3);
      border-radius: calc(var(--radius) + 8px);
      padding: clamp(10px, 2.5vw, 16px);
    }

    /* ─── Tile ──────────────────────────────────────────────────── */
    .tile {
      aspect-ratio: 1;
      background: var(--tile-bg);
      border-radius: var(--radius);
      border: 1.5px solid rgba(178,172,136,0.35);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 8px var(--shadow), 0 0 0 0 rgba(178,172,136,0);
      transition:
        transform var(--transition),
        box-shadow 0.25s ease,
        background 0.35s ease,
        border-color 0.35s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .tile:hover {
      box-shadow: 0 4px 18px var(--shadow), 0 0 0 2px rgba(178,172,136,0.4);
      background: #f0ece0;
    }
    .tile:active {
      box-shadow: 0 1px 6px var(--shadow);
    }
    .tile.solved {
      background: var(--tile-done);
      border-color: var(--sage);
      cursor: default;
      pointer-events: none;
    }
    .tile.solved:hover {
      box-shadow: 0 2px 8px var(--shadow);
    }
    /* Solved shimmer */
    .tile.solved::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
      border-radius: inherit;
    }

    /* ─── SVG Pattern inside tile ───────────────────────────────── */
    .tile svg {
      width: 72%;
      height: 72%;
      display: block;
      transition: transform var(--transition), opacity 0.3s ease;
    }
    .tile.solved svg {
      opacity: 0.85;
    }
    /* Solved check overlay */
    .tile .check {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.35s ease 0.15s, transform 0.35s cubic-bezier(0.34,1.56,0.64,1) 0.15s;
    }
    .tile.solved .check {
      opacity: 1;
      transform: scale(1);
    }
    .tile .check svg {
      width: 40%;
      height: 40%;
      opacity: 1;
    }

    /* ─── Buttons ───────────────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 10px 26px;
      border: 1.5px solid var(--sage);
      border-radius: 99px;
      background: transparent;
      color: var(--charcoal);
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.22s ease, color 0.22s ease, transform 0.18s ease, box-shadow 0.22s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover {
      background: var(--sage);
      color: #fff;
      box-shadow: 0 4px 14px rgba(178,172,136,0.4);
      transform: translateY(-1px);
    }
    .btn:active { transform: translateY(0); }
    .btn-primary {
      background: var(--charcoal);
      border-color: var(--charcoal);
      color: #fff;
    }
    .btn-primary:hover {
      background: #555;
      border-color: #555;
      box-shadow: 0 4px 14px rgba(51,51,51,0.3);
    }

    /* ─── Hint indicator dots ───────────────────────────────────── */
    .hint-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      align-items: center;
    }
    .hint-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--sage);
      opacity: 0.35;
      transition: opacity 0.3s;
    }
    .hint-dot.used { opacity: 0.1; }

    /* ─── Message toast ─────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--charcoal);
      color: #fff;
      padding: 10px 24px;
      border-radius: 99px;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 1000;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── Level Complete Popup ──────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(249,247,242,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    .popup {
      background: #fff;
      border: 1px solid rgba(178,172,136,0.4);
      border-radius: 24px;
      padding: clamp(28px, 6vw, 48px) clamp(24px, 6vw, 52px);
      text-align: center;
      max-width: 340px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(51,51,51,0.12);
      transform: scale(0.88) translateY(20px);
      transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
      opacity: 0;
    }
    .overlay.active .popup {
      transform: scale(1) translateY(0);
      opacity: 1;
    }
    .popup-kamon {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 12px;
      animation: spin-in 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
    }
    @keyframes spin-in {
      from { transform: rotate(-180deg) scale(0); opacity: 0; }
      to   { transform: rotate(0deg) scale(1);   opacity: 1; }
    }
    .popup h2 {
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.14em;
      color: var(--charcoal);
      margin-bottom: 6px;
    }
    .popup .popup-sub {
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 24px;
    }
    .popup-stats {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-bottom: 28px;
      padding: 16px;
      background: var(--bg);
      border-radius: 14px;
    }
    .popup-stat-val {
      font-size: 1.5rem;
      color: var(--charcoal);
    }
    .popup-stat-lbl {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sage);
    }
    .star-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 20px;
    }
    .star {
      font-size: 1.6rem;
      animation: pop-star 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .star:nth-child(2) { animation-delay: 0.08s; }
    .star:nth-child(3) { animation-delay: 0.16s; }
    @keyframes pop-star {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* ─── Level badge ───────────────────────────────────────────── */
    .level-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sage-dark);
      background: rgba(178,172,136,0.15);
      border: 1px solid rgba(178,172,136,0.3);
      border-radius: 99px;
      padding: 4px 14px;
    }

    /* ─── Particles ─────────────────────────────────────────────── */
    .particle-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 400;
    }

    /* ─── Responsive tweaks ─────────────────────────────────────── */
    @media (max-width: 400px) {
      .stat-value { font-size: 1.3rem; }
      .btn { padding: 9px 18px; font-size: 0.72rem; }
    }
    @media (max-height: 700px) {
      .wrapper { gap: 16px; padding: 12px 16px 20px; }
      header .logo-mark { font-size: 1.4rem; }
      header h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<canvas class="particle-canvas" id="particleCanvas"></canvas>

<div class="wrapper">

  <!-- Header -->
  <header>
    <span class="logo-mark"></span>
    
    <img src="gemini-3.1-flash-image-preview (nano-banana-2) [web-search]_a_Generate_a_single,_p (1).png" alt="Logo" style="width: 80px; height: auto; margin-bottom: 10px;">
    
    <h1>Zen Tile Match</h1>

    </div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn" id="replayBtn">Replay</button>
      <button class="btn btn-primary" id="nextBtn">Next Level →</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   ZEN TILE MATCH — Game Engine
═══════════════════════════════════════════════════════════════ */

/* ── SVG Pattern Library ─────────────────────────────────────── */
const PATTERNS = [

const KAMONS    = ['✿','⬡','⬢','◈','❋','⌘','☯','✦'];
const RANK_NAMES= ['Novice','Apprentice','Adept','Sage','Zen Master'];

  'Breathe and align',

  'Be the pattern',
  'Empty your mind',

  'Wu wei · effortless',

/* ── State ───────────────────────────────────────────────────── */
let state = {
  level: 1,
  moves: 0,
  score: 0,
  totalScore: 0,
  seconds: 0,
  timerID: null,
  hintsLeft: 3,
  tiles: [],        // { patternIdx, rotation, solved }
  targets: [],      // target rotation for each tile

  gameOver: false,
  hintActive: -1,
};

/* ── DOM refs ────────────────────────────────────────────────── */
const gridEl       = document.getElementById('grid');
const levelDisp    = document.getElementById('levelDisp');
const movesDisp    = document.getElementById('movesDisp');

const scoreDisp    = document.getElementById('scoreDisp');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const hintDotsEl   = document.getElementById('hintDots');
const hintBtn      = document.getElementById('hintBtn');
const shuffleBtn   = document.getElementById('shuffleBtn');
const newGameBtn   = document.getElementById('newGameBtn');
const overlay      = document.getElementById('overlay');
const popupKamon   = document.getElementById('popupKamon');
const popupSub     = document.getElementById('popupSub');
const starRow      = document.getElementById('starRow');
const popupMoves   = document.getElementById('popupMoves');
const popupTime    = document.getElementById('popupTime');
const popupScore   = document.getElementById('popupScore');
const replayBtn    = document.getElementById('replayBtn');
const nextBtn      = document.getElementById('nextBtn');
const toastEl      = document.getElementById('toast');
const badgeText    = document.getElementById('badgeText');
const canvas       = document.getElementById('particleCanvas');
const ctx          = canvas.getContext('2d');

/* ── Helpers ─────────────────────────────────────────────────── */
function rand(n) { return Math.floor(Math.random() * n); }
function pick(arr) { return arr[rand(arr.length)]; }

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function showToast(msg, duration = 1800) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastEl._to);
  toastEl._to = setTimeout(() => toastEl.classList.remove('show'), duration);
}

/* ── Timer ───────────────────────────────────────────────────── */
function startTimer() {
  clearInterval(state.timerID);
  state.timerID = setInterval(() => {
    state.seconds++;
    timerDisp.textContent = formatTime(state.seconds);
  }, 1000);
}
function stopTimer() { clearInterval(state.timerID); }

/* ── Score ───────────────────────────────────────────────────── */
function calcScore() {
  const timeBonus  = Math.max(0, 300 - state.seconds) * 2;
  const moveBonus  = Math.max(0, 80 - state.moves) * 5;
  const levelMult  = state.level;
  return Math.round((500 + timeBonus + moveBonus) * levelMult);
}

/* ── Level rank badge ────────────────────────────────────────── */
function updateBadge() {
  const rankIdx = Math.min(Math.floor((state.level - 1) / 2), RANK_NAMES.length - 1);
  badgeText.textContent = `${RANK_NAMES[rankIdx]} · Level ${state.level}`;
}

/* ── Hint dots ───────────────────────────────────────────────── */
function renderHintDots() {
  hintDotsEl.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'hint-dot' + (i >= state.hintsLeft ? ' used' : '');
    hintDotsEl.appendChild(d);
  }
}

/* ── Build level ─────────────────────────────────────────────── */
function buildLevel() {
  state.tiles   = [];
  state.targets = [];
  state.solvedCount = 0;
  state.moves   = 0;
  state.seconds = 0;
  state.gameOver = false;
  state.hintActive = -1;
  if (state.level === 1) state.hintsLeft = 3;

  // Pick patterns for 4x4 grid
  // Pair up: 8 pairs of patterns, each needs target rotation
  const patternPool = [];
  const numPatterns = Math.min(PATTERNS.length, 4 + Math.floor(state.level / 2));
  for (let i = 0; i < 16; i++) patternPool.push(i % numPatterns);
  patternPool.sort(() => Math.random() - 0.5);

  // Each tile gets a target rotation (0 = up = solved)
  // Start with shuffled rotations. Difficulty increases with level.
  const rotSteps = [1, 2, 3]; // 90, 180, 270 degrees offset
  for (let i = 0; i < 16; i++) {
    const target = 0; // target is always 0° (upright)
    // How far off: harder levels → more tiles offset
    const difficulty = Math.min(state.level, 5);
    let startRot;
    if (difficulty === 1) {
      // ~half the tiles are already correct
      startRot = (Math.random() < 0.45) ? 0 : pick(rotSteps);
    } else if (difficulty <= 3) {
      startRot = (Math.random() < 0.2) ? 0 : pick(rotSteps);
    } else {
      startRot = pick([...rotSteps, ...rotSteps, 0]);
    }

    state.tiles.push({
      patternIdx: patternPool[i],
      rotation:   startRot,
      solved:     startRot === 0,
    });
    state.targets.push(target);
  }

  state.solvedCount = state.tiles.filter(t => t.solved).length;

  movesDisp.textContent = '0';
  timerDisp.textContent = '0:00';
  levelDisp.textContent = state.level;
  updateBadge();
  renderHintDots();
  stopTimer();
  startTimer();
  renderGrid();
  updateProgress();
}

/* ── Render grid ─────────────────────────────────────────────── */
function renderGrid() {
  gridEl.innerHTML = '';
  state.tiles.forEach((tile, idx) => {
    const div = document.createElement('div');
    div.className = 'tile' + (tile.solved ? ' solved' : '');
    div.dataset.idx = idx;

    // SVG pattern
    const svgWrap = document.createElement('div');
    svgWrap.innerHTML = PATTERNS[tile.patternIdx];
    const svgEl = svgWrap.querySelector('svg');
    svgEl.style.transform = `rotate(${tile.rotation * 90}deg)`;
    div.appendChild(svgEl);

    // Check mark overlay
    const check = document.createElement('div');
    check.className = 'check';
    check.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#8f8a68" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>`;
    div.appendChild(check);

    if (!tile.solved) {
      div.addEventListener('click', () => onTileClick(idx));
    }
    gridEl.appendChild(div);
  });
}

/* ── Update single tile DOM ───────────────────────────────────── */
function updateTileDOM(idx) {
  const tile = state.tiles[idx];
  const tileEl = gridEl.children[idx];
  if (!tileEl) return;
  const svgEl = tileEl.querySelector('svg:not(.check svg)');
  if (svgEl) {
    svgEl.style.transform = `rotate(${tile.rotation * 90}deg)`;
  }
  if (tile.solved) {
    tileEl.classList.add('solved');
    tileEl.removeEventListener('click', tileEl._handler);
  }
}

/* ── Tile click handler ──────────────────────────────────────── */
function onTileClick(idx) {
  if (state.gameOver) return;
  const tile = state.tiles[idx];
  if (tile.solved) return;

  // Clear hint highlight
  clearHintHighlight();

  // Rotate +90
  tile.rotation = (tile.rotation + 1) % 4;
  state.moves++;
  movesDisp.textContent = state.moves;

  // Check if solved
  if (tile.rotation === state.targets[idx]) {
    tile.solved = true;
    state.solvedCount++;
    updateProgress();
    updateTileDOM(idx);
    // small delay for CSS transition then remove click
    setTimeout(() => {
      const tileEl = gridEl.children[idx];
      if (tileEl) tileEl.style.pointerEvents = 'none';
    }, 500);
    if (state.solvedCount === 16) {
      setTimeout(onLevelComplete, 600);
    }
  } else {
    updateTileDOM(idx);
  }

  // Score update (live)
  scoreDisp.textContent = state.totalScore + calcScore();
}

/* ── Progress ────────────────────────────────────────────────── */
function updateProgress() {
  const pct = (state.solvedCount / 16) * 100;
  progressFill.style.width = pct + '%';
  progressText.textContent = `${state.solvedCount} / 16`;
}

/* ── Hint ────────────────────────────────────────────────────── */
function clearHintHighlight() {
  if (state.hintActive >= 0) {
    const prev = gridEl.children[state.hintActive];
    if (prev) prev.style.boxShadow = '';
    state.hintActive = -1;
  }
}

function doHint() {
  if (state.hintsLeft <= 0) { showToast('No hints remaining'); return; }
  clearHintHighlight();

  // Find a random unsolved tile
  const unsolved = state.tiles
    .map((t, i) => ({ t, i }))
    .filter(({ t }) => !t.solved);

  if (unsolved.length === 0) return;
  const { i } = pick(unsolved);
  state.hintActive = i;
  state.hintsLeft--;
  renderHintDots();

  const tileEl = gridEl.children[i];
  if (tileEl) {
    tileEl.style.boxShadow = '0 0 0 3px #B2AC88, 0 4px 20px rgba(178,172,136,0.5)';
    // Calculate how many clicks needed
    const cur = state.tiles[i].rotation;
    const tgt = state.targets[i];
    const clicks = ((tgt - cur) + 4) % 4;
    const msg = clicks === 0 ? 'Already aligned!' :
                clicks === 1 ? 'One rotation needed' :
                clicks === 2 ? 'Two rotations needed' : 'Three rotations needed';
    showToast(msg, 2200);
    setTimeout(clearHintHighlight, 3000);
  }
}

/* ── Shuffle (penalty: +10 moves) ────────────────────────────── */
function doShuffle() {
  state.tiles.forEach((tile, i) => {
    if (!tile.solved) {
      tile.rotation = rand(4);
      tile.solved = tile.rotation === state.targets[i];
    }
  });
  state.solvedCount = state.tiles.filter(t => t.solved).length;
  state.moves += 10;
  movesDisp.textContent = state.moves;
  clearHintHighlight();
  renderGrid();
  updateProgress();
  showToast('+10 move penalty');
}

/* ── Level Complete ──────────────────────────────────────────── */
function onLevelComplete() {
  stopTimer();
  state.gameOver = true;

  const levelScore = calcScore();
  state.totalScore += levelScore;

  // Stars: 1-3 based on moves
  const maxMoves = 20 + state.level * 4;
  const stars = state.moves <= maxMoves * 0.4 ? 3 :
                state.moves <= maxMoves * 0.7 ? 2 : 1;

  popupKamon.textContent = KAMONS[(state.level - 1) % KAMONS.length];
  popupSub.textContent   = LEVEL_PHRASES[(state.level - 1) % LEVEL_PHRASES.length];
  popupMoves.textContent = state.moves;
  popupTime.textContent  = formatTime(state.seconds);
  popupScore.textContent = levelScore;

  starRow.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const s = document.createElement('span');
    s.className = 'star';
    s.textContent = i < stars ? '★' : '☆';
    s.style.color = i < stars ? '#B2AC88' : '#ddd';
    s.style.animationDelay = `${0.3 + i * 0.08}s`;
    starRow.appendChild(s);
  }

  scoreDisp.textContent = state.totalScore;
  overlay.classList.add('active');
  launchParticles();
}

/* ── Particles ───────────────────────────────────────────────── */
function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let particles = [];
function launchParticles() {
  particles = [];
  const colors = ['#B2AC88','#d4cfa8','#8f8a68','#c8c4a0','#e8e4cc'];
  for (let i = 0; i < 80; i++) {
    particles.push({
      x:  canvas.width  * 0.5,
      y:  canvas.height * 0.45,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 1.2) * 9,
      r:  Math.random() * 4 + 2,
      color: pick(colors),
      alpha: 1,
      gravity: 0.18,
      shape: rand(3), // 0=circle,1=square,2=diamond
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.15,
    });
  }
  requestAnimationFrame(animateParticles);
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.alpha > 0.02);
  particles.forEach(p => {
    p.vy += p.gravity;
    p.x  += p.vx;
    p.y  += p.vy;
    p.alpha -= 0.012;
    p.rot   += p.rotV;
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    if (p.shape === 0) {
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.shape === 1) {
      ctx.fillRect(-p.r, -p.r, p.r * 2, p.r * 2);
    } else {
      ctx.beginPath();
      ctx.moveTo(0, -p.r * 1.4);
      ctx.lineTo(p.r * 1.4, 0);
      ctx.lineTo(0, p.r * 1.4);
      ctx.lineTo(-p.r * 1.4, 0);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  });
  if (particles.length > 0) requestAnimationFrame(animateParticles);
  else ctx.clearRect(0, 0, canvas.width, canvas.height);
}

/* ── Button listeners ────────────────────────────────────────── */
hintBtn.addEventListener('click', doHint);
shuffleBtn.addEventListener('click', doShuffle);
newGameBtn.addEventListener('click', () => {
  state.level = 1;
  state.totalScore = 0;
  state.hintsLeft = 3;
  buildLevel();
  showToast('New game started');
});
replayBtn.addEventListener('click', () => {
  overlay.classList.remove('active');
  buildLevel();
});
nextBtn.addEventListener('click', () => {
  overlay.classList.remove('active');
  state.level++;
  buildLevel();
});

// Close overlay on backdrop click
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) overlay.classList.remove('active');
});

/* ── Keyboard shortcuts ──────────────────────────────────────── */
document.addEventListener('keydown', (e) => {
  if (e.key === 'h' || e.key === 'H') doHint();
  if (e.key === 's' || e.key === 'S') doShuffle();
  if (e.key === 'Escape') overlay.classList.remove('active');
});

/* ── Init ────────────────────────────────────────────────────── */
buildLevel();
</script>
</body>
</html>
